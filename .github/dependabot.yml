version: 2
updates:
  # The published npm package's runtime dependencies — most importantly the LDL
  # renderer (@openpowershift/logic-diagram-language) and the optional resvg.
  # A "fix" prefix means merging the PR flows into the next release-please
  # release, so shipping a new renderer version is: merge the Dependabot PR →
  # merge the release PR. (Dev tooling — esbuild, typescript, @asciidoctor/core —
  # is left to manual updates so build-tool bumps don't cut releases.)
  - package-ecosystem: npm
    directory: /js
    schedule:
      interval: weekly
    commit-message:
      prefix: fix
    allow:
      - dependency-type: production
    groups:
      renderer:
        patterns: ['*']

  # The renderer used by the gem's test suite — keep it current for parity.
  - package-ecosystem: npm
    directory: /test/js
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      test-deps:
        patterns: ['*']

  # Keep workflow actions current (no release).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ['*']
